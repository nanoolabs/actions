[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""

body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group }}
    {% for commit in commits %}
        - {% if commit.breaking %}**[ ✖_✖ ] BREAKING:** {% endif %}\
          {{ commit.message | upper_first }} \
          ({% if commit.remote.username %}by [@{{ commit.remote.username }}](https://github.com/{{ commit.remote.username }}) via {% endif %}\
          [`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/commit/{{ commit.id }}))\
    {% endfor %}
{% endfor %}\n
"""

footer = """
***
*Generated automatically by Nanoo Labs Pipeline.*
"""

trim = true

[git]
conventional_commits = true
filter_unconventional = false
sort_commits = "newest"

commit_parsers = [
  { message = "^feat(\\(.*\\))?!?:", group = "Features  [ ^■^ ]" },
  { message = "^fix(\\(.*\\))?!?:", group = "Bug Fixes  [ ;■_■ ]" },
  { message = "^perf(\\(.*\\))?!?:", group = "Performance  [ █_█ ]" },
  { message = "^refactor(\\(.*\\))?!?:", group = "Refactoring  [ ▞▚_▚▞ ]" },
  { message = "^doc(\\(.*\\))?s?:", group = "Documentation  [ ▦_▦ ]" },
  { message = "^style(\\(.*\\))?!?:", group = "Styling & UI  [ ▣_▣ ]" },
  { message = "^ci(\\(.*\\))?!?:", group = "CI/CD  [ ☁_■ ]" },
  { message = "^chore(\\(.*\\))?!?:", group = "Maintenance  [ ▓_▓ ]" },
  { message = "^test(\\(.*\\))?!?:", group = "Testing  [ ¬■_■ ]" },
  { message = ".*", group = "Other  [ □_□ ]" },
]

filter_commits = false
tag_pattern = "v[0-9]*"

[remote.github]
owner = "nanoolabs"
repo = ""
